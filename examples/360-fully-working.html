<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>videojs-vr with WebXR</title>
  <link href="../node_modules/video.js/dist/video-js.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
    #vr-button-container {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
    }
    #overlay-rectangle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 150px;
      border: 5px solid white;
      background-color: rgba(255, 255, 255, 0); /* Transparent background */
      z-index: 10000; /* Ensure it appears on top of the canvas */
      display: none; /* Initially hidden, we'll show it in WebXR mode */
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>
  <!-- 360 Video Player -->
  <video width="640" height="300" id="videojs-vr-player" class="video-js vjs-default-skin" controls playsinline>
    <source src="../samples/eagle-360.mp4" type="video/mp4">
  </video>

  <!-- Container for the VR Button -->
  <div id="vr-button-container"></div>

  <!-- Transparent rectangle with a white border for testing -->
  <div id="overlay-rectangle"></div>

  <!-- Include video.js and videojs-vr -->
  <script src="../node_modules/video.js/dist/video.js"></script>
  <script src="../node_modules/videojs-vr/dist/videojs-vr.min.js"></script>

  <!-- Import WebXR Polyfill to support WebXR in unsupported browsers -->
  <script src="https://unpkg.com/webxr-polyfill@latest/build/webxr-polyfill.js"></script>

  <script>
    (function(window, videojs) {
      // Initialize video.js player
      const player = window.player = videojs('videojs-vr-player');
      player.mediainfo = player.mediainfo || {};
      player.mediainfo.projection = '360';

      // Initialize the videojs-vr plugin with 360 projection
      const vr = player.vr({
        projection: 'AUTO',
        debug: true,
        forceCardboard: true,
        webVREnabled: false
      });

      const overlayRectangle = document.getElementById('overlay-rectangle');
      const exitVrButton = document.getElementById('exit-vr-button');

      // Ensure proper canvas resizing for VR mode
      function resizeCanvasForXR(canvas) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        canvas.style.width = '100%';
        canvas.style.height = '100%';
      }

      // Check if WebXR is supported and create the VR button
      function createVRButton() {
        if (navigator.xr) {
          navigator.xr.isSessionSupported('immersive-vr').then((supported) => {
            if (supported) {
              const vrButton = document.createElement('button');
              vrButton.textContent = 'Enter VR';
              vrButton.style.padding = '12px';
              vrButton.style.background = '#333';
              vrButton.style.color = '#fff';
              vrButton.style.border = 'none';
              vrButton.style.borderRadius = '5px';
              vrButton.style.cursor = 'pointer';

              vrButton.onclick = function () {
                // Start the WebXR session
                navigator.xr.requestSession('immersive-vr', {
                  requiredFeatures: ['viewer'], // Use viewer space for broad compatibility
                }).then((session) => {
                  session.addEventListener('end', onSessionEnded);

                  // Ensure the canvas is used by the WebXR session
                  vr.renderer.xr.setSession(session);

                  // Prepare the canvas and ensure proper fullscreen behavior
                  const canvas = vr.renderer.domElement;
                  resizeCanvasForXR(canvas);

                  // Show the overlay rectangle during WebXR mode
                  overlayRectangle.style.display = 'block';

                  // Use reference space for VR rendering
                  session.requestReferenceSpace('viewer').then((refSpace) => {
                    vr.xrReferenceSpace = refSpace;

                    // Start rendering the VR frame
                    session.requestAnimationFrame(onXRFrame);

                    // Trigger fullscreen mode
                    document.body.requestFullscreen().catch(err => {
                      console.warn("Fullscreen request failed:", err);
                    });

                    console.log("WebXR session started.");
                  }).catch((err) => {
                    console.warn("Error using viewer reference space.", err);
                  });
                }).catch((err) => {
                  console.error("Error starting WebXR session:", err);
                });
              };

              document.getElementById('vr-button-container').appendChild(vrButton);
            } else {
              console.warn("WebXR not supported on this device.");
            }
          });
        } else {
          console.warn("WebXR is not available in this browser.");
        }
      }

      // Handle the WebXR rendering loop
      function onXRFrame(time, frame) {
        const session = frame.session;
        session.requestAnimationFrame(onXRFrame); // Continue the rendering loop

        // Render the scene using the VR renderer
        vr.renderer.render(vr.scene, vr.camera);
      }

      // Handle WebXR session end
      function onSessionEnded() {
        document.exitFullscreen();
        console.log("WebXR session ended.");
        // Hide the overlay rectangle when exiting WebXR
        overlayRectangle.style.display = 'none';
      }

      // Create the VR button when the player is ready
      player.ready(function() {
        createVRButton();
      });

    }(window, window.videojs));
  </script>
</body>
</html>
