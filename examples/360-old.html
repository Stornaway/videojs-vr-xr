<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>videojs-vr with WebXR</title>
  <link href="../node_modules/video.js/dist/video-js.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
    #vr-button-container {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      z-index: 999;
    }
  </style>
</head>
<body>
  <!-- 360 Video Player -->
  <video width="640" height="300" id="videojs-vr-player" class="video-js vjs-default-skin" controls playsinline>
    <source src="../samples/eagle-360.mp4" type="video/mp4">
  </video>

  <!-- Container for the VR Button -->
  <div id="vr-button-container"></div>

  <!-- Include video.js and videojs-vr -->
  <script src="../node_modules/video.js/dist/video.js"></script>
  <script src="../node_modules/videojs-vr/dist/videojs-vr.min.js"></script>

  <!-- Import WebXR Polyfill to support WebXR in unsupported browsers -->
  <script src="https://unpkg.com/webxr-polyfill@latest/build/webxr-polyfill.js"></script>

  <script>
    (function(window, videojs) {
      // Initialize video.js player
      const player = window.player = videojs('videojs-vr-player');
      player.mediainfo = player.mediainfo || {};
      player.mediainfo.projection = '360';

      // Initialize the videojs-vr plugin with 360 projection
      const vr = player.vr({
        projection: 'AUTO',
        debug: true,
        forceCardboard: true,
        webVREnabled: false
      });

      // Check if WebXR is supported and create the VR button
      function createVRButton() {
        if (navigator.xr) {
          navigator.xr.isSessionSupported('immersive-vr').then((supported) => {
            if (supported) {
              const vrButton = document.createElement('button');
              vrButton.textContent = 'Enter VR';
              vrButton.style.padding = '12px';
              vrButton.style.background = '#333';
              vrButton.style.color = '#fff';
              vrButton.style.border = 'none';
              vrButton.style.borderRadius = '5px';
              vrButton.style.cursor = 'pointer';

              vrButton.onclick = function () {
                // Attempt to start the WebXR session with 'local-floor' required
                navigator.xr.requestSession('immersive-vr', {
                  requiredFeatures: ['local-floor'], // Request 'local-floor' explicitly
                  optionalFeatures: ['viewer'] // 'viewer' is broadly supported
                }).then((session) => {
                  // Try to use 'local-floor', if it fails, fallback to 'viewer'
                  session.requestReferenceSpace('local-floor').then((refSpace) => {
                    onSessionStarted(session, refSpace); // Use 'local-floor' space
                  }).catch((err) => {
                    console.warn('Fallback to viewer reference space.', err);
                    session.requestReferenceSpace('viewer').then((viewerSpace) => {
                      onSessionStarted(session, viewerSpace); // Use 'viewer' space as fallback
                    });
                  });
                }).catch((err) => {
                  console.error("Error starting WebXR session:", err);
                });
              };


              document.getElementById('vr-button-container').appendChild(vrButton);
            } else {
              console.warn("WebXR not supported on this device.");
            }
          });
        } else {
          console.warn("WebXR is not available in this browser.");
        }
      }

      // Function to start the WebXR session and integrate it with the existing player
      function onSessionStarted(session) {
        session.addEventListener('end', onSessionEnded);

        // Use videojs-vr built-in renderer logic
        vr.renderer.xr.setSession(session);

        // Directly use the viewer reference space for broader compatibility
        session.requestReferenceSpace('viewer').then((refSpace) => {
          session.requestAnimationFrame(onXRFrame);
        });

        console.log("WebXR session started.");
      }

      // Frame rendering loop
      function onXRFrame(time, frame) {
        let session = frame.session;
        session.requestAnimationFrame(onXRFrame);
        // Additional WebXR-specific rendering logic can go here
      }

      // Handle session end event
      function onSessionEnded() {
        console.log("WebXR session ended.");
      }

      // Create the VR button once the player is ready
      player.ready(function() {
        createVRButton();
      });

    }(window, window.videojs));
  </script>
</body>
</html>
